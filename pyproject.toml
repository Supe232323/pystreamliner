[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pystreamliner"
version = "1.11"
authors = [{ name = "Supe232323" }]
description = "Automatically clean up messy Python files without breaking anything using AST analysis."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[project.urls]
"Homepage" = "https://github.com/Supe232323/pystreamliner"  # Update with your real repo

[project.scripts]
pystreamliner = "streamliner:main"

[tool.setuptools]
py-modules = ["streamliner"]

[tool.setuptools.package-find]
exclude = ["test*", "tests*", "test_messy*"]
